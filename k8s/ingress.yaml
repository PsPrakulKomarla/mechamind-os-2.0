apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mechamind-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: api.mechamind.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mechamind-backend-svc
            port:
              number: 80
