version: '3.8'

services:
  # MechaMind OS Backend API
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: mechamind-api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mechamind
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secretpassword
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - PROMETHEUS_MULTIPROC_DIR=/tmp/metrics
    depends_on:
      - postgres
      - redis
      - neo4j
      - qdrant
      - minio
    networks:
      - mechamind-net

  # Core Relational DB
  postgres:
    image: postgres:15-alpine
    container_name: mechamind-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mechamind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mechamind-net

  # In-memory Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: mechamind-redis
    ports:
      - "6379:6379"
    networks:
      - mechamind-net

  # Knowledge Graph Database
  neo4j:
    image: neo4j:5.9.0
    container_name: mechamind-neo4j
    environment:
      - NEO4J_AUTH=neo4j/secretpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - mechamind-net

  # Vector Database for Embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mechamind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mechamind-net

  # S3-Compatible Object Storage
  minio:
    image: minio/minio
    container_name: mechamind-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mechamind-net

  # Prometheus Scraper (Observability)
  prometheus:
    image: prom/prometheus
    container_name: mechamind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mechamind-net

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  minio_data:

networks:
  mechamind-net:
    driver: bridge
